# =============================================================================
# GitHub Actions Tutorial - 04
#
# Topic:
# Matrix Strategy
#
# Objective:
#
# Execute the same Playwright test suite on multiple browsers
# without writing separate jobs.
#
# Matrix Strategy automatically creates one job per browser.
#
# Example
#
# Browser Matrix
#
# chromium
# firefox
# webkit
#
# GitHub creates
#
# Job 1 → Chromium
# Job 2 → Firefox
# Job 3 → WebKit
#
# These jobs can run in parallel.
#
# =============================================================================

name: Playwright Matrix Execution

on:

  workflow_dispatch:

    inputs:

      environment:

        description: Select Environment

        required: true

        default: qa

        type: choice

        options:

          - qa
          - stage
          - preprod

      workers:

        description: Number of Parallel Workers

        required: true

        default: "3"

        type: choice

        options:

          - "1"
          - "2"
          - "3"
          - "4"

      headless:

        description: Run Browser in Headless Mode

        required: true

        default: true

        type: boolean

jobs:

  playwright-tests:

    runs-on: ubuntu-latest

    # =========================================================================
    # Matrix Strategy
    #
    # GitHub automatically creates one job
    # for each browser listed below.
    # =========================================================================

    strategy:

      fail-fast: false

      matrix:

        browser:

          - chromium
          - firefox
          - webkit

    steps:

      # -----------------------------------------------------------------------
      # Checkout Repository
      # -----------------------------------------------------------------------

      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Setup Node.js
      # -----------------------------------------------------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v4

        with:
          node-version: 20

      # -----------------------------------------------------------------------
      # Install Dependencies
      # -----------------------------------------------------------------------

      - name: Install Dependencies
        run: npm install

      # -----------------------------------------------------------------------
      # Install Playwright Browsers
      # -----------------------------------------------------------------------

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # -----------------------------------------------------------------------
      # Display Runtime Information
      # -----------------------------------------------------------------------

      - name: Print Runtime Information

        run: |

          echo "Environment : ${{ inputs.environment }}"
          echo "Browser     : ${{ matrix.browser }}"
          echo "Workers     : ${{ inputs.workers }}"
          echo "Headless    : ${{ inputs.headless }}"

      # -----------------------------------------------------------------------
      # Execute Playwright
      # -----------------------------------------------------------------------

      - name: Execute Playwright Tests

        run: npm run test:run

        env:

          ENV: ${{ inputs.environment }}

          BROWSER: ${{ matrix.browser }}

          WORKERS: ${{ inputs.workers }}

          HEADLESS: ${{ inputs.headless }}