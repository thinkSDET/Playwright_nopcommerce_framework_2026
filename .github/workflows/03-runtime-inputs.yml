# =============================================================================
# GitHub Actions Tutorial - 03
#
# Topic:
# Runtime Inputs using workflow_dispatch
#
# Objective:
#
# Instead of hardcoding values inside the workflow,
# allow the user to select them from the GitHub UI.
#
# Runtime Flow
#
# GitHub UI
#      ↓
# Workflow Inputs
#      ↓
# Environment Variables
#      ↓
# runtime.ts
#      ↓
# playwright.config.ts
#      ↓
# Playwright Execution
#
# =============================================================================

name: Playwright Runtime Inputs

# =============================================================================
# workflow_dispatch
#
# Allows the workflow to be executed manually.
#
# "inputs" creates controls on the GitHub Actions screen.
#
# =============================================================================

on:

  workflow_dispatch:

    inputs:

      environment:

        description: Select Environment

        required: true

        default: qa

        type: choice

        options:

          - qa

          - stage

          - preprod

      browser:

        description: Select Browser

        required: true

        default: chromium

        type: choice

        options:

          - chromium

          - firefox

          - webkit

      workers:

        description: Number of Parallel Workers

        required: true

        default: "3"

        type: choice

        options:

          - "1"

          - "2"

          - "3"

          - "4"

      headless:

        description: Run Browser in Headless Mode

        required: true

        default: true

        type: boolean

# =============================================================================
# Jobs
# =============================================================================

jobs:

  playwright-tests:

    runs-on: ubuntu-latest

    steps:

      # Download Repository

      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install Node

      - name: Setup Node.js
        uses: actions/setup-node@v4

        with:
          node-version: 20

      # Install npm packages

      - name: Install Dependencies
        run: npm install

      # Install Playwright browsers

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # ==========================================================
      # Display values selected from GitHub UI
      #
      # This step is only for learning/debugging.
      # We'll remove it later.
      # ==========================================================

      - name: Print Runtime Inputs

        run: |
          echo "Environment : ${{ inputs.environment }}"
          echo "Browser     : ${{ inputs.browser }}"
          echo "Workers     : ${{ inputs.workers }}"
          echo "Headless    : ${{ inputs.headless }}"

      # ==========================================================
      # Execute Playwright
      #
      # Pass GitHub Inputs as Environment Variables.
      #
      # runtime.ts will automatically read:
      #
      # process.env.ENV
      # process.env.BROWSER
      # process.env.WORKERS
      # process.env.HEADLESS
      #
      # ==========================================================

      - name: Execute Playwright Tests

        run: npm run test:run

        env:

          ENV: ${{ inputs.environment }}

          BROWSER: ${{ inputs.browser }}

          WORKERS: ${{ inputs.workers }}

          HEADLESS: ${{ inputs.headless }}